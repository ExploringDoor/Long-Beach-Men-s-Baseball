name: Check LBDC Scores

on:
  schedule:
    # Runs every hour on Saturdays 9am-8pm Pacific (UTC-7)
    # 16:00-03:00 UTC = 9am-8pm PDT
    - cron: '0 16,17,18,19,20,21,22,23,0,1,2,3 * * 6'
  workflow_dispatch: # allows manual trigger anytime

jobs:
  check-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Check for new scores and load them
        env:
          SUPABASE_URL: https://vhovzpajuyphjatjlodo.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/check_scores.py
